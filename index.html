    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      pointer-events: none;
      z-index: 0;

    @keyframes drift {

      font-size: 1.15rem;
      font-weight: 500;
      line-height: 1.6;
      color: var(--text);
    }

    .logline-text em {
      color: var(--success);
      font-style: normal;
      font-weight: 500;
    }

    /* Action buttons */
    .logline-actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      justify-content: center;
    }

    .action-btn {
      background: transparent;
      border: 1px solid var(--border);

      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;

    .action-btn.copied {
      border-color: var(--success);
      color: var(--success);
    }

    /* Counter */
    .counter {
      text-align: center;
      margin-top: 32px;
      font-size: 0.78rem;
      color: var(--text-muted);
      opacity: 0.5;
    }

    .counter span {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      color: var(--accent-soft);
    }

    /* Placeholder state */
    .placeholder {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.95rem;
      opacity: 0.5;
      padding: 40px 0;
    }

    .placeholder .icon {
      font-size: 2.5rem;

    footer {
      margin-top: auto;
      text-align: center;
      padding: 32px 0 8px;
      font-size: 0.75rem;
      color: var(--text-muted);
      opacity: 0.4;
    }

    footer a {
      color: var(--accent-soft);
      text-decoration: none;
    }

    /* Responsive */
    @media (max-width: 480px) {
      header { padding: 28px 0 24px; }
      .logo { font-size: 1.8rem; }
      .option-btn { padding: 8px 14px; font-size: 0.82rem; }
      .roll-btn { padding: 16px 40px; font-size: 1.05rem; }
      .logline-text { font-size: 1.05rem; }
    }

    /* Copy notification */
    .copy-toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--success);
      color: var(--bg);
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 0.88rem;
      padding: 12px 24px;
      border-radius: 100px;
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 100;
      pointer-events: none;
    }

    .copy-toast.show {
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

    const obstacles = {
      'Sci-Fi': ['a malfunctioning AI that controls the ship', 'time dilation that ages everyone differently', 'a rival faction with a weapon that bends space', 'a biological plague that rewrites memories', 'a collapsing wormhole that\'s pulling everything in'],
      'Fantasy': ['a betrayal from within their inner circle', 'a prophecy that demands an impossible sacrifice', 'an ancient spell that twists reality around them', 'a war that has lasted so long no one remembers why it started', 'a monster that can only be killed by someone who loves it'],
      'Horror': ['something that shouldn\'t exist and doesn\'t want to be found', 'a ritual that can\'t be stopped once begun', 'the dead who refuse to stay dead', 'a darkness that feeds on fear and grows stronger with each passing hour', 'a mirror that shows not reflections but replacements'],
      'Romance': ['a secret that would destroy the relationship', 'a rival who seems perfect on paper', 'circumstances that keep pulling them apart', 'a past that won\'t stay buried', 'a choice between what they want and what they owe'],
      'Thriller': ['a double agent inside their own team', 'a countdown they can\'t see and don\'t understand', 'evidence that points to someone they trust', 'a web of lies where nothing is what it seems', 'a shadowy organization that\'s always one step ahead'],
      'Comedy': ['a catastrophic misunderstanding that spirals wildly out of control', 'a series of escalating lies that no one can keep straight', 'a rival who is somehow both worse and better than them', 'a family secret that everyone else already knows', 'a series of unfortunate events that are almost too perfect'],
      'Drama': ['a family that communicates through secrets', 'a past mistake that refuses to stay buried', 'a moral dilemma with no right answer', 'a truth that will shatter everything they\'ve built', 'a betrayal from the one person they trusted completely'],
      'Mystery': ['a detective who can\'t trust their own memory', 'a suspect who seems to be everywhere at once', 'evidence that contradicts itself', 'a cover-up that spans generations', 'a key witness who changes their story every time'],
      'Adventure': ['a guide who may be leading them to their death', 'a map that changes with the landscape', 'rival explorers who will stop at nothing to get there first', 'a series of traps designed by a madman', 'a creature that guards the path and tests their worth'],
      'Western': ['a lawman who has stopped believing in justice', 'a gang that outnumbers them ten to one', 'a landscape as hostile as the people on it', 'a past that rides right behind them', 'a town divided by loyalty and hatred']
    };

    const stakes = {
      'Sci-Fi': ['humanity\'s only chance at survival slips away', 'consciousness itself becomes the battlefield', 'the fabric of spacetime unravels beyond repair', 'billions hang in the balance of a single decision', 'the line between human and machine dissolves forever'],
      'Fantasy': ['the realm falls into eternal darkness', 'magic itself dies, leaving the world defenseless', 'the balance between worlds is destroyed forever', 'the prophecy completes—and not the way anyone hoped', 'the dead rise, and this time there\'s no sealing them away'],
      'Horror': ['sanity becomes a luxury no one can afford', 'the entity grows stronger with each passing soul', 'reality itself begins to rot from the inside out', 'what\'s buried wants to come back, and it\'s almost Sunday', 'the darkness doesn\'t just kill—it replaces'],
      'Romance': ['two lives that could have been one are about to be lost forever', 'the lie becomes bigger than the love that built it', 'forever takes on a meaning neither of them expected', 'they\'ll lose each other not to distance but to who they\'ve become', 'the choice between them and everything else becomes permanent'],
      'Thriller': ['the truth dies with the last witness', 'the clock reaches zero and nobody can stop it', 'trust becomes a weapon and loyalty becomes a liability', 'the wrong person gets the evidence first', 'the conspiracy completes its final phase unnoticed'],
      'Comedy': ['absolutely everything, in the most ridiculous way possible', 'their dignity—and they\'re not sure they can afford to lose more', 'the wedding goes ahead and nobody wants that', 'they get exactly what they wanted and it\'s terrible', 'chaos wins, but at least it\'s entertaining'],
      'Drama': ['a truth that can never be unsaid', 'the family they\'ve built is the family they might lose', 'redemption has an expiration date', 'the wound doesn\'t heal—it transforms', 'the thing they feared most becomes the thing that defines them'],
      'Mystery': ['the killer claims another victim while everyone watches', 'the truth is buried so deep it may never surface', 'the wrong person goes to prison and the right person walks free', 'the pattern reveals itself too late to stop it', 'the case closes, but the answer doesn\'t'],
      'Adventure': ['the map leads somewhere no one was meant to find', 'the jungle takes more than it gives', 'the summit demands a price measured in blood', 'the treasure is a curse, and the curse is already spreading', 'the journey changes them into someone they don\'t recognize'],
      'Western': ['justice is just another word for vengeance', 'the land claims everyone eventually', 'the law is only as strong as the person enforcing it', 'the frontier isn\'t the edge of civilization—it\'s the edge of themselves', 'the bullet finds its mark, but the story doesn\'t end there']
    };

    // === STATE ===
    let selectedGenre = null;
    let selectedCast = null;
    let rollCount = parseInt(localStorage.getItem('stormy-count') || '0');
    let isRolling = false;

    // === INIT ===
    function init() {
      const genreGrid = document.getElementById('genre-options');
      genres.forEach(g => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = g;
        btn.onclick = () => selectOption('genre', g, btn);
        genreGrid.appendChild(btn);
      });

      const castGrid = document.getElementById('cast-options');
      casts.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = c;
        btn.onclick = () => selectOption('cast', c, btn);
        castGrid.appendChild(btn);
      });

      document.getElementById('count-num').textContent = rollCount.toLocaleString();
    }

    function selectOption(type, value, btn) {
      const container = btn.parentElement;
      container.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      if (type === 'genre') selectedGenre = value;
      else selectedCast = value;
    }

    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function roll() {
      if (isRolling) return;
      const genre = selectedGenre || pick(genres);
      const cast = selectedCast || pick(casts);

      isRolling = true;
      const btn = document.getElementById('roll-btn');
      btn.classList.add('rolling');

      document.getElementById('placeholder').style.display = 'none';
      const card = document.getElementById('logline-card');
      card.classList.remove('visible');

      setTimeout(() => {
        const protag = pick(protagonists[cast]);
        const goal = pick(goals[genre]);
        const obstacle = pick(obstacles[genre]);
        const stake = pick(stakes[genre]);
        const template = pick(templates);

        const logline = template.t(protag, goal, obstacle, stake);
        lastLogline = logline.replace(/<em>|<\/em>/g, '');

        document.getElementById('logline-genre').textContent = genre + ' · ' + cast;
        document.getElementById('logline-text').innerHTML = logline;

        card.classList.add('visible');
        btn.classList.remove('rolling');

        rollCount++;
        localStorage.setItem('stormy-count', rollCount.toString());
        document.getElementById('count-num').textContent = rollCount.toLocaleString();

        isRolling = false;
      }, 700);
    }

    function copyLogline() {
      navigator.clipboard.writeText(lastLogline.replace(/<em>|<\/em>/g, '')).then(() => {
        const toast = document.getElementById('copy-toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
        const btn = document.getElementById('copy-btn');
        btn.classList.add('copied');
        btn.textContent = '✅ Copied';
        setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '📋 Copy'; }, 2000);
      });
    }
    function shareLogline() {
      const text = lastLogline.replace(/<em>|<\/em>/g, '');
      if (navigator.share) {
        navigator.share({ title: 'Random Story Logline', text: text + ' — randomstory.ai' });
      } else {
        navigator.clipboard.writeText(text + ' — randomstory.ai');
        const toast = document.getElementById('copy-toast');
        toast.textContent = 'Link copied!';
        toast.classList.add('show');
        setTimeout(() => { toast.classList.remove('show'); toast.textContent = 'Copied!'; }, 2000);
      }
    }
    init(); loadLang();
  </script>
</body>
</html>
