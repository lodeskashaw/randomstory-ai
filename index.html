    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #14141f;
      --surface-hover: #1a1a2e;
      --accent: #6c5ce7;
      --accent-glow: rgba(108, 92, 231, 0.3);

      --text: #e8e8f0;
      --text-muted: #8888a0;

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Ambient background */
    .ambient {
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(108, 92, 231, 0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(0, 206, 201, 0.05) 0%, transparent 50%);
      animation: drift 20s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(2%, -1%) rotate(1deg); }
      66% { transform: translate(-1%, 2%) rotate(-1deg); }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 640px;
      margin: 0 auto;
      padding: 24px 20px 60px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      text-align: center;
      padding: 40px 0 32px;
    }

    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-soft) 50%, var(--success) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 0.95rem;
      color: var(--text-muted);
      font-weight: 300;
      letter-spacing: 0.02em;
    }

    /* Selectors */
    .selectors {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 24px;
    }

    .selector-group label {
      display: block;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .option-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .option-btn {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: var(--text);
      padding: 10px 18px;
      border-radius: 100px;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 400;
      cursor: pointer;
      transition: all 0.2s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .option-btn:hover {
      background: var(--surface-hover);
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.12);
    }

    .option-btn.active {
      background: rgba(108, 92, 231, 0.3);
      border-color: var(--accent);
      color: white;
      font-weight: 500;
    }

    /* Roll button */
    .roll-section {
      margin: 8px 0 32px;
      display: flex;
      justify-content: center;
    }

    .roll-btn {
      position: relative;
      background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
      border: none;
      color: white;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.15rem;
      font-weight: 600;
      padding: 18px 48px;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 24px var(--accent-glow),
                  0 1px 3px rgba(0,0,0,0.3);
      letter-spacing: 0.02em;
      overflow: hidden;
    }

    .roll-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px var(--accent-glow),
                  0 2px 6px rgba(0,0,0,0.3);
    }

    .roll-btn:active {
      transform: translateY(0) scale(0.98);
    }

      margin-right: 8px;
      transition: transform 0.3s ease;
    }

    .roll-btn:hover .dice-icon {
      transform: rotate(15deg);
    }

    .roll-btn.rolling .dice-icon {
      animation: spin 0.4s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

      flex-direction: column;
      align-items: center;

    .logline-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.15rem;
      font-weight: 500;
      line-height: 1.6;
      color: var(--text);
    }

    .logline-text em {
      color: var(--success);
      font-style: normal;
      font-weight: 500;
    }

    /* Action buttons */
    .logline-actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      justify-content: center;
    }

    .action-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      padding: 8px 16px;
      border-radius: 100px;

      transition: all 0.2s ease;

      align-items: center;

    .action-btn:hover {
      background: var(--surface-hover);
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.12);
    }

    .action-btn.copied {
      border-color: var(--success);
      color: var(--success);
    }

    /* Counter */
    .counter {
      text-align: center;
      margin-top: 32px;
      font-size: 0.78rem;
      color: var(--text-muted);
      opacity: 0.5;
    }

    .counter span {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      color: var(--accent-soft);
    }

    /* Placeholder state */
    .placeholder {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.95rem;
      opacity: 0.5;
      padding: 40px 0;
    }

    .placeholder .icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    /* Footer */
    footer {
      margin-top: auto;
      text-align: center;
      padding: 32px 0 8px;
      font-size: 0.75rem;
      color: var(--text-muted);
      opacity: 0.4;
    }

    footer a {
      color: var(--accent-soft);
      text-decoration: none;
    }

    /* Responsive */
    @media (max-width: 480px) {
      header { padding: 28px 0 24px; }
      .logo { font-size: 1.8rem; }
      .option-btn { padding: 8px 14px; font-size: 0.82rem; }
      .roll-btn { padding: 16px 40px; font-size: 1.05rem; }
      .logline-text { font-size: 1.05rem; }
    }

    /* Copy notification */
    .copy-toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--success);
      color: var(--bg);
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 0.88rem;
      padding: 12px 24px;
      border-radius: 100px;
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 100;
      pointer-events: none;
    }

    .copy-toast.show {
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

// === STATE ===
    let selectedGenre = null;
    let selectedCast = null;
    let rollCount = parseInt(localStorage.getItem('stormy-count') || '0');
    let isRolling = false;

    // === INIT ===
    function init() {
      const genreGrid = document.getElementById('genre-options');
      genres.forEach(g => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = g;
        btn.onclick = () => selectOption('genre', g, btn);
        genreGrid.appendChild(btn);
      });

      const castGrid = document.getElementById('cast-options');
      casts.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = c;
        btn.onclick = () => selectOption('cast', c, btn);
        castGrid.appendChild(btn);
      });

      document.getElementById('count-num').textContent = rollCount.toLocaleString();
    }

    function selectOption(type, value, btn) {
      const container = btn.parentElement;
      container.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      if (type === 'genre') selectedGenre = value;
      else selectedCast = value;
    }

    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function roll() {
      if (isRolling) return;
      const lang = window._lang || 'en';
      const genre = selectedGenre || pick(genres);
      const cast = selectedCast || pick(casts);

      isRolling = true;
      const btn = document.getElementById('roll-btn');
      btn.classList.add('rolling');

      document.getElementById('placeholder').style.display = 'none';
      const card = document.getElementById('logline-card');
      card.classList.remove('visible');

      setTimeout(() => {
        const protag = pick(protagonists[lang][cast]);
        const goal = pick(goals[lang][genre]);
        const obstacle = pick(obstacles[lang][genre]);
        const stake = pick(stakes[lang][genre]);
        const template = pick(templates[lang]);

        const logline = template.t(protag, goal, obstacle, stake);
        lastLogline = logline.replace(/<em>|<\/em>/g, '');

        document.getElementById('logline-genre').textContent = (lang === 'zh' ? '类型' : genre) + ' · ' + (lang === 'zh' ? cast : cast);
        document.getElementById('logline-text').innerHTML = logline;

        card.classList.add('visible');
        btn.classList.remove('rolling');

        rollCount++;
        localStorage.setItem('stormy-count', rollCount.toString());
        document.getElementById('count-num').textContent = rollCount.toLocaleString();

        isRolling = false;
      }, 700);
    }

    function copyLogline() {
      navigator.clipboard.writeText(lastLogline.replace(/<em>|<\/em>/g, '')).then(() => {
        const toast = document.getElementById('copy-toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
        const btn = document.getElementById('copy-btn');
        btn.classList.add('copied');
        btn.textContent = '✅ Copied';
        setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '📋 Copy'; }, 2000);
      });
    }
    function shareLogline() {
      const text = lastLogline.replace(/<em>|<\/em>/g, '');
      if (navigator.share) {
        navigator.share({ title: 'Random Story Logline', text: text + ' — randomstory.ai' });
      } else {
        navigator.clipboard.writeText(text + ' — randomstory.ai');
        const toast = document.getElementById('copy-toast');
        toast.textContent = 'Link copied!';
        toast.classList.add('show');
        setTimeout(() => { toast.classList.remove('show'); toast.textContent = 'Copied!'; }, 2000);
      }
    }
    init(); loadLang();
  </script>
